name: Build and Test
on: [push, pull_request]
jobs:
  build-ubuntu:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.x'
        
    - name: Build
      run: |
        find . -type f \( -name "*.sln" -o -name "*.slnx" \) -print0 | while IFS= read -r -d '' f; do
          dotnet build "$f"
        done

    - name: Run tests
      run: |
        find . -type f \( -name "*.sln" -o -name "*.slnx" \) -print0 | while IFS= read -r -d '' f; do
          dotnet test "$f"
        done

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.x'

    - name: Build and Test
      shell: pwsh
      run: |
        Get-ChildItem -Recurse -Include *.sln, *.slnx | ForEach-Object {
          Write-Host "Processing: $($_.FullName)"
          dotnet build $_.FullName
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dotnet test $_.FullName --no-build
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        }
